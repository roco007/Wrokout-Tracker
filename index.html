<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <title>Month 1 Workout Tracker</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/workout-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="assets/workout-mark.svg" alt="" class="brand-mark">
        <div>
          <p class="eyebrow">Month 1</p>
          <h1>Workout Tracker</h1>
        </div>
      </div>
      <button class="icon-button" id="resetDay" type="button" aria-label="Reset current day" title="Reset current day">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M20 12a8 8 0 1 1-2.34-5.66"></path>
          <path d="M20 4v5h-5"></path>
        </svg>
      </button>
    </header>

    <main>
      <section class="summary-band" aria-labelledby="summaryTitle">
        <div class="summary-copy">
          <p class="eyebrow">Today</p>
          <h2 id="summaryTitle">Choose a workout day</h2>
        </div>
        <div class="summary-dashboard" aria-label="Workout progress">
          <div class="progress-ring" aria-hidden="true">
            <span id="progressPercent">0%</span>
          </div>
          <div class="completion-block">
            <p class="metric-label">Completed</p>
            <p class="metric-value"><span id="completedCount">0</span>/<span id="totalCount">0</span></p>
          </div>
        </div>
      </section>

      <nav class="day-tabs" id="dayTabs" aria-label="Workout days"></nav>

      <section class="toolbar" aria-label="Workout overview">
        <div class="muscle-strip" id="muscleStrip"></div>
        <button class="secondary-button" id="toggleDone" type="button">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M9 11l3 3L22 4"></path>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
          Hide Done
        </button>
      </section>

      <section class="task-list" id="taskList" aria-live="polite"></section>
    </main>
  </div>

  <div id="tutorialModal"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; padding: 20px;">
    <div
      style="background:white; padding:20px; border-radius:12px; max-width:500px; text-align:center; position:relative;">

      <button id="closeModal"
        style="position:absolute; top:-15px; right:-15px; width:35px; height:35px; border-radius:50%; border:none; background:#333; color:white; font-size:20px; cursor:pointer; display:flex; justify-content:center; align-items:center; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">
        &times;
      </button>

      <img id="tutorialImg" src="" alt="Exercise Tutorial"
        style="max-width:100%; height:auto; border-radius:8px; display:block;">
    </div>
  </div>
</body>

</html>
